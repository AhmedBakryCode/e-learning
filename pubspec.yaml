name: e_learning
description: "Production-ready Flutter e-learning platform."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.8.0+1
  equatable: ^2.0.7
  flutter_bloc: ^9.1.1
  get_it: ^8.0.3
  go_router: ^15.1.2
  video_player: ^2.10.0
  image_picker: ^1.2.1
  carousel_slider: ^5.1.2
  flutter_windowmanager_plus: ^1.0.1
  shared_preferences: ^2.5.5
  socket_io_client: ^3.0.2
  url_launcher: ^6.3.1
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.7
  media_kit_libs_android_video: ^1.3.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.7

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/e-logo.png"
  adaptive_icon_background: "assets/images/e-logo.png"
  adaptive_icon_foreground: "assets/images/e-logo.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_native_splash:
  color: "#ffffff"
  image: "assets/images/e-logo.png"
  android_12:
    image: "assets/images/e-logo.png"
    icon_background_color: "#ffffff"
